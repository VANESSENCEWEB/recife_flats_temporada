<body>

  <rf-menu wraps=".site-content"></rf-menu>

  <div class="site-content site-content--house">

    <div class="hero-roof" aria-hidden="true">
      <svg class="hero-roof__svg" viewBox="0 0 1200 140" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 140 L0 52 L600 0 L1200 52 L1200 140 Z" fill="var(--terracotta-600)"/>
        <path d="M0 52 L600 0 L1200 52" fill="none" stroke="var(--terracotta-800)" stroke-width="2" vector-effect="non-scaling-stroke"/>
        <path d="M80 140 L80 72 L1120 72 L1120 140 Z" fill="var(--terracotta-700)" opacity="0.35"/>
      </svg>
    </div>

    <rf-announcement>
      🌴 Promoção de Temporada — <strong>até 20% off</strong> nas reservas de 5+ noites
    </rf-announcement>

    <div class="hero-house">
      <rf-navbar over-hero hero-target="#hero"></rf-navbar>

      <rf-hero
        hero-id="home"
        api-base="./data"
        video-day="./assets/videos/video.mp4"
        video-night="./assets/videos/video.mp4"
        poster-day="./assets/images/boa_viagem-01.avif.png"
        poster-night="./assets/images/boa_viagem-01.avif.png"
        timezone="America/Recife"
        day-start="6"
        night-start="18"
        eyebrow="Boa Viagem e Pina, Recife · PE"
        title='Um lugar de <em>verdade</em> pra ficar em Recife.'
        description="Apartamentos mobiliados, prontos pra usar, com fotos reais e reserva direta — sem surpresa na chegada.">
      </rf-hero>
    </div>

    <rf-trust-strip></rf-trust-strip>

    <rf-apartments-teaser></rf-apartments-teaser>

    <rf-matching-teaser></rf-matching-teaser>

    <rf-reservation-steps></rf-reservation-steps>

    <rf-amenities-section></rf-amenities-section>

    <rf-location-section></rf-location-section>

    <rf-testimonials-section></rf-testimonials-section>

    <rf-faq-section></rf-faq-section>

    <rf-booking-promo></rf-booking-promo>

    <rf-footer></rf-footer>

  </div>

  <rf-matching-wizard></rf-matching-wizard>

  <rf-floating-whatsapp></rf-floating-whatsapp>
